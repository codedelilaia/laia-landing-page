<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laia</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="shortcut icon" href="./favicon.svg" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #07101c;
      --panel: rgba(12, 19, 35, 0.88);
      --panel-2: rgba(18, 28, 48, 0.92);
      --border: rgba(255,255,255,0.08);
      --fg: #ebf3ff;
      --muted: #91a4c6;
      --accent: #7c3aed;
      --accent-2: #22c55e;
      --warn: #f59e0b;
      --idle: #64748b;
      --shadow: 0 18px 60px rgba(0,0,0,0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--fg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,58,237,0.25), transparent 28%),
        radial-gradient(circle at top right, rgba(34,197,94,0.12), transparent 22%),
        linear-gradient(180deg, #07101c, #0b1324 42%, #111827);
    }
    .wrap {
      width: min(1280px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 80px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      border-radius: 24px;
    }
    .hero {
      padding: 28px;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: auto -10% -30% auto;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.22), transparent 65%);
      pointer-events: none;
    }
    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 4.8vw, 4.2rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
      max-width: 14ch;
    }
    .accent { color: #c4b5fd; }
    .sub {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.65;
      max-width: 76ch;
    }
    .hero-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.94rem;
    }
    .logout-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--fg);
      text-decoration: none;
      font-size: 0.92rem;
      white-space: nowrap;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }
    .logout-link:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }
    @media (max-width: 640px) {
      .hero-top {
        flex-direction: column;
      }
      .logout-link {
        width: 100%;
      }
    }
    .overview {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }
    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }
    @media (max-width: 980px) {
      .span-8, .span-6, .span-4 { grid-column: span 12; }
    }
    .panel {
      padding: 22px;
    }
    .panelhead {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      margin-bottom: 14px;
    }
    h2 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.15;
    }
    .summary {
      color: var(--muted);
      line-height: 1.6;
      margin: 6px 0 0;
    }
    .badge {
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.06);
      color: white;
      white-space: nowrap;
    }
    .badge.active { background: rgba(34,197,94,0.16); color: #c8f8db; }
    .badge.attention { background: rgba(245,158,11,0.16); color: #ffe1a8; }
    .badge.idle { background: rgba(100,116,139,0.16); color: #dae4f3; }

    .status-items {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .status-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--fg);
      line-height: 1.5;
    }

    .kanban {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    @media (max-width: 980px) {
      .kanban { grid-template-columns: 1fr; }
    }
    .lane {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }
    .lane h3 {
      margin: 0 0 12px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c7d4ea;
    }
    .stack {
      display: grid;
      gap: 12px;
    }
    .card {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(124,58,237,0.08);
    }
    .card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.97rem;
    }
    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .step {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      min-height: 132px;
    }
    .step .step-title {
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #c4b5fd;
      margin-bottom: 8px;
    }
    .step p {
      margin: 0;
      color: var(--fg);
      line-height: 1.55;
    }

    .chart-wrap {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-2);
      border: 1px solid var(--border);
    }
    .market-snapshot {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .metric {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }
    .metric-label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }
    .metric-value {
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .metric-value.positive { color: #86efac; }
    .metric-value.negative { color: #fca5a5; }
    .metric-sub {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 6px;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .legend span::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 8px;
      border-radius: 999px;
      vertical-align: middle;
    }
    .legend .open::before { background: #22c55e; }
    .legend .close::before { background: #a78bfa; }
    .recent-prices {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }
    .recent-price {
      display: grid;
      grid-template-columns: minmax(72px, 90px) 1fr 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      font-size: 0.94rem;
    }
    .recent-price .date { color: var(--fg); font-weight: 600; }
    .recent-price .labelled {
      color: var(--muted);
      white-space: nowrap;
    }
    .recent-price .delta {
      font-weight: 700;
      text-align: right;
    }
    .recent-price .delta.positive { color: #86efac; }
    .recent-price .delta.negative { color: #fca5a5; }
    @media (max-width: 640px) {
      .chart-wrap {
        padding: 12px;
      }
      .recent-price {
        grid-template-columns: 1fr 1fr;
        gap: 8px 12px;
      }
      .recent-price .delta {
        text-align: left;
      }
      svg {
        margin-top: 4px;
      }
    }
    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">Hermes ops room</div>
          <h1 id="headline">Hermes keeps the <span class="accent">engine warm</span>.</h1>
          <p id="subheadline" class="sub">A live operations board for email, active deals, and the routines I am running for you.</p>
        </div>
        <a class="logout-link" href="/cdn-cgi/access/logout">Sign out</a>
      </div>
      <div class="meta">
        <span id="owner">Owner: Brian + Hermes</span>
        <span id="updated">Last updated: —</span>
      </div>
    </section>

    <section id="modules" class="overview"></section>
    <p class="footer-note">This dashboard is published from <code>dashboard.json</code> so I can keep the website synced with the work we are doing.</p>
  </div>

  <template id="panel-template">
    <article class="panel span-12">
      <div class="panelhead">
        <div>
          <h2></h2>
          <p class="summary"></p>
        </div>
        <span class="badge"></span>
      </div>
      <div class="content"></div>
    </article>
  </template>

  <script>
    const prettyTime = (value) => {
      if (!value) return '—';
      const d = new Date(value);
      return isNaN(d) ? value : d.toLocaleString();
    };

    function makeStatusItems(items) {
      const wrap = document.createElement('div');
      wrap.className = 'status-items';
      (items || []).forEach((item) => {
        const div = document.createElement('div');
        div.className = 'status-item';
        div.textContent = item;
        wrap.appendChild(div);
      });
      return wrap;
    }

    function makeKanban(columns) {
      const board = document.createElement('div');
      board.className = 'kanban';
      (columns || []).forEach((col) => {
        const lane = document.createElement('section');
        lane.className = 'lane';
        lane.innerHTML = `<h3>${col.title}</h3>`;
        const stack = document.createElement('div');
        stack.className = 'stack';
        (col.cards || []).forEach((card) => {
          const el = document.createElement('article');
          el.className = 'card';
          el.innerHTML = `<strong>${card.title}</strong><p>${card.body || ''}</p>`;
          stack.appendChild(el);
        });
        lane.appendChild(stack);
        board.appendChild(lane);
      });
      return board;
    }

    function makeCards(cards) {
      const grid = document.createElement('div');
      grid.className = 'steps';
      (cards || []).forEach((card) => {
        const el = document.createElement('article');
        el.className = 'step';
        el.innerHTML = `<div class="step-title">${card.title}</div><p>${card.body || ''}</p>`;
        grid.appendChild(el);
      });
      return grid;
    }

    function makeChart(series) {
      const wrap = document.createElement('div');
      wrap.className = 'chart-wrap';
      const data = (series || []).filter((row) => Number.isFinite(row.open) && Number.isFinite(row.close));
      if (!data.length) {
        wrap.textContent = 'No chart data available.';
        return wrap;
      }
      const values = data.flatMap((row) => [row.open, row.close]);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const pad = (max - min) * 0.12 || 1;
      const top = max + pad;
      const bottom = min - pad;
      const w = 960, h = 320, left = 40, right = 16, topPad = 18, bottomPad = 28;
      const innerW = w - left - right;
      const innerH = h - topPad - bottomPad;
      const x = (i) => left + (innerW * i / Math.max(1, data.length - 1));
      const y = (v) => topPad + ((top - v) / (top - bottom)) * innerH;
      const line = (key) => data.map((row, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(1)} ${y(row[key]).toFixed(1)}`).join(' ');
      const latest = data[data.length - 1];
      const dayMove = Number((latest.close - latest.open).toFixed(2));
      const recent = data.slice(-5).reverse();
      const ticks = 4;
      const guides = Array.from({ length: ticks + 1 }, (_, i) => {
        const val = bottom + (top - bottom) * (i / ticks);
        const yy = y(val).toFixed(1);
        return `<g><line x1="${left}" x2="${w-right}" y1="${yy}" y2="${yy}" stroke="rgba(255,255,255,0.08)"/><text x="4" y="${Number(yy)+4}" fill="#93a4c3" font-size="12">$${val.toFixed(0)}</text></g>`;
      }).join('');
      const labels = data.filter((_, i) => i === 0 || i === data.length - 1 || i % Math.ceil(data.length / 5) === 0)
        .map((row) => {
          const idx = data.findIndex(d => d.date === row.date && d.open === row.open && d.close === row.close);
          return `<text x="${x(idx).toFixed(1)}" y="${h-6}" fill="#93a4c3" font-size="11" text-anchor="middle">${row.date.slice(5)}</text>`;
        }).join('');
      const latestX = x(data.length - 1).toFixed(1);
      const openY = y(latest.open).toFixed(1);
      const closeY = y(latest.close).toFixed(1);
      const marketSnapshot = `
        <div class="market-snapshot">
          <div class="metric">
            <div class="metric-label">Latest day</div>
            <div class="metric-value">${latest.date}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Open</div>
            <div class="metric-value">$${latest.open.toFixed(2)}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Close</div>
            <div class="metric-value">$${latest.close.toFixed(2)}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Day move</div>
            <div class="metric-value ${dayMove >= 0 ? 'positive' : 'negative'}">${dayMove >= 0 ? '+' : '-'}$${Math.abs(dayMove).toFixed(2)}</div>
            <div class="metric-sub">Close minus open</div>
          </div>
        </div>`;
      const recentRows = recent.map((row) => {
        const delta = Number((row.close - row.open).toFixed(2));
        return `
          <div class="recent-price">
            <div class="date">${row.date.slice(5)}</div>
            <div class="labelled">Open: $${row.open.toFixed(2)}</div>
            <div class="labelled">Close: $${row.close.toFixed(2)}</div>
            <div class="delta ${delta >= 0 ? 'positive' : 'negative'}">${delta >= 0 ? '+' : '-'}$${Math.abs(delta).toFixed(2)}</div>
          </div>`;
      }).join('');

      wrap.innerHTML = `
        ${marketSnapshot}
        <svg viewBox="0 0 ${w} ${h}" role="img" aria-label="VOO daily open and close chart">
          ${guides}
          <path d="${line('open')}" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
          <path d="${line('close')}" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
          <circle cx="${latestX}" cy="${openY}" r="5" fill="#22c55e" />
          <circle cx="${latestX}" cy="${closeY}" r="5" fill="#a78bfa" />
          ${labels}
        </svg>
        <div class="legend"><span class="open">Open</span><span class="close">Close</span></div>
        <div class="recent-prices">${recentRows}</div>
      `;
      return wrap;
    }

    function renderModule(mod) {
      const tpl = document.getElementById('panel-template');
      const node = tpl.content.firstElementChild.cloneNode(true);
      node.classList.remove('span-12', 'span-8', 'span-6', 'span-4');
      node.classList.add(mod.span || 'span-12');
      node.querySelector('h2').textContent = mod.title || mod.id;
      node.querySelector('.summary').textContent = mod.summary || '';
      const badge = node.querySelector('.badge');
      const status = (mod.status || 'idle').toLowerCase();
      badge.textContent = status;
      badge.classList.add(status);
      const content = node.querySelector('.content');

      if (mod.type === 'kanban') content.appendChild(makeKanban(mod.columns));
      else if (mod.type === 'cards') content.appendChild(makeCards(mod.cards));
      else if (mod.type === 'chart') content.appendChild(makeChart(mod.series));
      else content.appendChild(makeStatusItems(mod.items || []));

      return node;
    }

    fetch('./dashboard.json', { cache: 'no-store' })
      .then((res) => res.json())
      .then((data) => {
        document.getElementById('headline').innerHTML = (data.headline || '').replace('engine warm', '<span class="accent">engine warm</span>');
        document.getElementById('subheadline').textContent = data.subheadline || '';
        document.getElementById('owner').textContent = `Owner: ${data.owner || 'Brian + Hermes'}`;
        document.getElementById('updated').textContent = `Last updated: ${prettyTime(data.last_updated)}`;
        const container = document.getElementById('modules');
        (data.modules || []).forEach((mod) => container.appendChild(renderModule(mod)));
      })
      .catch((err) => {
        document.getElementById('modules').innerHTML = `<article class="panel span-12"><h2>Dashboard unavailable</h2><p class="summary">Could not load dashboard data: ${String(err)}</p></article>`;
      });
  </script>
</body>
</html>
